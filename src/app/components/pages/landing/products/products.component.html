<section id="products" class="products-section">
  <!-- Banner NUESTROS PRODUCTOS -->
  <div class="products-section__banner">
    <h2 class="products-section__banner-title">NUESTROS PRODUCTOS</h2>
  </div>

  <!-- Grid de productos: 3 arriba, 2 abajo centrados -->
  <div class="products-section__content">
    <div class="products-section__grid">
      <article class="product-item" *ngFor="let product of products.slice(0, 3)">
        <div class="product-item__image-card">
          <img *ngIf="product.imageUrl" [src]="product.imageUrl" [alt]="product.title">
          <span *ngIf="!product.imageUrl" class="product-item__placeholder">{{ product.title }}</span>
        </div>
        <h3 class="product-item__title">{{ product.title | uppercase }}</h3>
        <p class="product-item__desc">{{ product.description }}</p>
        <a [routerLink]="['/producto', product.id]" class="product-item__btn">Más información</a>
      </article>
      <div class="products-section__row2" *ngIf="products.length > 3">
        <article class="product-item" *ngFor="let product of products.slice(3, 5)">
          <div class="product-item__image-card">
            <img *ngIf="product.imageUrl" [src]="product.imageUrl" [alt]="product.title">
            <span *ngIf="!product.imageUrl" class="product-item__placeholder">{{ product.title }}</span>
          </div>
          <h3 class="product-item__title">{{ product.title | uppercase }}</h3>
          <p class="product-item__desc">{{ product.description }}</p>
          <a [routerLink]="['/producto', product.id]" class="product-item__btn">Más información</a>
        </article>
      </div>
    </div>
  </div>
</section>
