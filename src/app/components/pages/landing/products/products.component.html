<section id="products" class="products-section">
  <!-- Banner NUESTROS PRODUCTOS -->
  <div class="products-section__banner">
    <h2 class="products-section__banner-title">NUESTROS PRODUCTOS</h2>
  </div>

  <!-- Grid de productos: 3 arriba, 2 abajo centrados -->
  <div class="products-section__content">
    <div class="products-section__grid">
      <article class="product-item" *ngFor="let product of products">
        <a
          [routerLink]="['/product', product.id]"
          class="product-item__image-card"
          [class.product-item__image-card--strata-triz]="product.id === '1'"
          [class.product-item__image-card--stratamed]="product.id === '2'"
          [class.product-item__image-card--stratacel]="product.id === '3'"
          [class.product-item__image-card--stratamark]="product.id === '4'"
          [attr.aria-label]="'Más información: ' + product.title">
          <img *ngIf="product.imageUrl" [src]="product.imageUrl" [alt]="product.title">
          <span *ngIf="!product.imageUrl" class="product-item__placeholder">{{ product.title }}</span>
        </a>
        <h3 class="product-item__title">{{ (product.title | uppercase).replace('®', '') }}<sup class="product-item__mark" *ngIf="product.title.includes('®')">®</sup></h3>
        <p class="product-item__desc">{{ product.description }}</p>
        <a [routerLink]="['/product', product.id]" class="product-item__btn">Más información</a>
      </article>
    </div>
  </div>
</section>
